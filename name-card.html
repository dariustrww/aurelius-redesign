<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>D Aurelius Group — Name Cards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Outfit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold:        #C6A55C;
    --gold-light:  #E2CC8F;
    --gold-bright: #D4AF37;
    --gold-dark:   #8B7332;
    --black:       #0A0A0A;
    --black-rich:  #111111;
    --black-card:  #161616;
    --white:       #FAFAFA;
    --gray:        #888;
    --serif:       'Cormorant Garamond', Georgia, serif;
    --sans:        'Outfit', sans-serif;

    /* Trim: 85 × 55 mm. Bleed: 3 mm each side → 91 × 61 mm canvas. */
    --trim-w: 85mm;
    --trim-h: 55mm;
    --bleed:  3mm;
    --safe:   4mm;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: #1d1d1d;
    color: var(--white);
    font-family: var(--sans);
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
  }

  /* ── PAGE CHROME ── */
  .app {
    padding: 3rem 2rem 5rem;
    max-width: 1400px;
    margin: 0 auto;
  }

  .app-head {
    text-align: center;
    margin-bottom: 3rem;
  }

  .app-head .label {
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1rem;
  }

  .app-head h1 {
    font-family: var(--serif);
    font-size: 2.4rem;
    font-weight: 300;
    line-height: 1.1;
    color: var(--white);
  }

  .app-head h1 em {
    font-style: italic;
    color: var(--gold-light);
  }

  .app-head p {
    margin-top: 0.8rem;
    font-size: 0.95rem;
    color: rgba(255,255,255,0.45);
  }

  .toolbar {
    display: flex;
    justify-content: center;
    gap: 0.75rem;
    margin-bottom: 3rem;
    flex-wrap: wrap;
  }

  .toolbar button {
    padding: 0.6rem 1.5rem;
    background: transparent;
    border: 1px solid rgba(198,165,92,0.35);
    color: var(--gold);
    font-family: var(--sans);
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .toolbar button:hover,
  .toolbar button.active {
    background: var(--gold);
    color: var(--black);
  }

  /* ── CARD DECK (screen view) ── */
  .deck {
    display: flex;
    flex-direction: column;
    gap: 3.5rem;
    align-items: center;
  }

  .pair {
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .pair-label {
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-bottom: 1rem;
    text-align: center;
  }

  .pair-group { display: flex; flex-direction: column; align-items: center; }

  /* ── THE CARD ── */
  .card {
    width: var(--trim-w);
    height: var(--trim-h);
    background: var(--black);
    color: var(--white);
    position: relative;
    overflow: hidden;
    box-shadow:
      0 30px 60px rgba(0,0,0,0.55),
      0 0 0 1px rgba(198,165,92,0.08);
    font-family: var(--sans);
    /* show at 2× on screen for readability; reset for print */
    transform: scale(2);
    transform-origin: top left;
  }

  /* reserve layout space for the scaled card */
  .pair-group .card-slot {
    width: calc(var(--trim-w) * 2);
    height: calc(var(--trim-h) * 2);
    position: relative;
  }

  .card-caption {
    margin-top: 1rem;
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
  }

  /* ── FRONT ── */
  .card.front {
    padding: var(--safe);
    display: grid;
    grid-template-rows: auto 1fr auto;
  }

  .card.front::before {
    /* soft gold radial accent in bottom-right, barely there */
    content: '';
    position: absolute;
    bottom: -30mm;
    right: -30mm;
    width: 70mm;
    height: 70mm;
    background: radial-gradient(circle, rgba(198,165,92,0.10) 0%, transparent 60%);
    pointer-events: none;
  }

  .card.front::after {
    /* thin gold hairline framing the bottom-left corner — signature detail */
    content: '';
    position: absolute;
    left: var(--safe);
    bottom: var(--safe);
    width: 14mm;
    height: 1px;
    background: linear-gradient(to right, var(--gold), transparent);
    pointer-events: none;
  }

  .front-head {
    display: flex;
    align-items: center;
    gap: 2mm;
    z-index: 2;
  }

  .logo-mark {
    width: 7mm;
    height: 7mm;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(198,165,92,0.15), transparent 70%);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .logo-mark img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .wordmark {
    font-family: var(--serif);
    font-size: 2.8mm;
    font-weight: 500;
    color: var(--gold-light);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    line-height: 1;
  }

  .front-body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 3mm 0 2mm;
    z-index: 2;
  }

  .name {
    font-family: var(--serif);
    font-size: 8mm;
    font-weight: 400;
    line-height: 1;
    color: var(--white);
    letter-spacing: -0.005em;
    margin-bottom: 2mm;
  }

  .name em {
    font-style: italic;
    color: var(--gold-light);
    font-weight: 400;
  }

  .hairline {
    width: 8mm;
    height: 1px;
    background: var(--gold);
    margin-bottom: 2mm;
  }

  .title {
    font-size: 2.2mm;
    font-weight: 500;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--gold);
  }

  .front-foot {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 1mm 2.5mm;
    align-items: center;
    font-size: 2.3mm;
    color: rgba(255,255,255,0.75);
    letter-spacing: 0.02em;
    z-index: 2;
    line-height: 1.3;
  }

  .front-foot .key {
    font-size: 1.9mm;
    font-weight: 600;
    letter-spacing: 0.3em;
    color: var(--gold);
    text-transform: uppercase;
  }

  .front-foot .val {
    font-size: 2.4mm;
    color: rgba(255,255,255,0.85);
  }

  /* Diamond motif in top-right */
  .diamond {
    position: absolute;
    top: var(--safe);
    right: var(--safe);
    display: flex;
    align-items: center;
    gap: 1.5mm;
    z-index: 3;
  }

  .diamond-line {
    width: 8mm;
    height: 1px;
    background: linear-gradient(to left, var(--gold-dark), transparent);
  }

  .diamond-shape {
    width: 1.6mm;
    height: 1.6mm;
    border: 0.4px solid var(--gold);
    transform: rotate(45deg);
  }

  /* ── BACK ── */
  .card.back {
    padding: var(--safe);
    background:
      radial-gradient(ellipse at center, rgba(198,165,92,0.09) 0%, transparent 60%),
      var(--black);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
  }

  .card.back::before,
  .card.back::after {
    content: '';
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 30mm;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold-dark), transparent);
  }

  .card.back::before { top: var(--safe); }
  .card.back::after  { bottom: var(--safe); }

  .back-logo {
    width: 14mm;
    height: 14mm;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(198,165,92,0.15), transparent 70%);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 3mm;
  }

  .back-logo img {
    width: 80%;
    height: 80%;
    object-fit: contain;
  }

  .back-wordmark {
    font-family: var(--serif);
    font-size: 3.4mm;
    font-weight: 500;
    color: var(--gold-light);
    letter-spacing: 0.32em;
    text-transform: uppercase;
    margin-bottom: 3mm;
  }

  .back-tagline {
    font-family: var(--serif);
    font-size: 3.6mm;
    font-weight: 400;
    font-style: italic;
    color: var(--white);
    line-height: 1.25;
    max-width: 60mm;
    margin-bottom: 4mm;
  }

  .back-tagline em {
    color: var(--gold-light);
  }

  .back-diamond {
    display: flex;
    align-items: center;
    gap: 1.5mm;
    margin-bottom: 3mm;
  }

  .back-diamond .line {
    width: 6mm;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold-dark), transparent);
  }

  .back-diamond .shape {
    width: 1.6mm;
    height: 1.6mm;
    border: 0.4px solid var(--gold);
    transform: rotate(45deg);
  }

  .back-foot {
    font-size: 1.9mm;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    line-height: 1.6;
  }

  .back-foot .site {
    color: var(--gold-light);
    letter-spacing: 0.22em;
    margin-top: 0.5mm;
    display: block;
  }

  /* ── PRINT MODE ── */
  body.print-mode {
    background: #fff;
  }

  body.print-mode .app-head,
  body.print-mode .toolbar,
  body.print-mode .pair-label,
  body.print-mode .card-caption { display: none; }

  body.print-mode .deck { gap: 8mm; }
  body.print-mode .pair  { gap: 6mm; }

  body.print-mode .card {
    transform: none;
    box-shadow: 0 0 0 0.1mm rgba(0,0,0,0.2);
  }

  body.print-mode .pair-group .card-slot {
    width: var(--trim-w);
    height: var(--trim-h);
  }

  @page {
    size: A4;
    margin: 12mm;
  }

  @media print {
    body { background: #fff !important; }
    .app-head, .toolbar, .pair-label, .card-caption { display: none !important; }
    .card { transform: none !important; box-shadow: none !important; outline: 0.1mm solid #999; }
    .pair-group .card-slot { width: var(--trim-w) !important; height: var(--trim-h) !important; }
    .deck { gap: 10mm !important; }
    .pair { gap: 6mm !important; page-break-inside: avoid; }
  }

  /* ── RESPONSIVE (screen only) ── */
  @media (max-width: 720px) {
    .card { transform: scale(1.4); }
    .pair-group .card-slot {
      width: calc(var(--trim-w) * 1.4);
      height: calc(var(--trim-h) * 1.4);
    }
  }
</style>
</head>
<body>
<div class="app">

  <header class="app-head">
    <div class="label">D Aurelius Group</div>
    <h1>Name Card <em>System</em></h1>
    <p>85 × 55 mm · Black &amp; gold · Print-ready · Front &amp; back</p>
  </header>

  <div class="toolbar">
    <button id="togglePrint">Preview Print Layout</button>
    <button onclick="window.print()">Export to PDF</button>
  </div>

  <div class="deck" id="deck"></div>

</div>

<script>
  /* ────────────────────────────────────────────────────────────
     Team roster — edit this array, everything else regenerates.
     One entry per person. Fields:
       name   — full name (use "<em>…</em>" to italicise a word)
       title  — role / position
       mobile — direct mobile
       email  — direct email
     ──────────────────────────────────────────────────────────── */
  const TEAM = [
    {
      name:   'Darius <em>Tan</em>',
      title:  'Managing Director',
      mobile: '+65 9339 1548',
      email:  'darius@d-aureliusgroup.com',
    },
    {
      name:   'Sample <em>Teammate</em>',
      title:  'Sales Executive',
      mobile: '+65 8123 4567',
      email:  'name@d-aureliusgroup.com',
    },
    {
      name:   'Another <em>Teammate</em>',
      title:  'Team Leader',
      mobile: '+65 9876 5432',
      email:  'name@d-aureliusgroup.com',
    },
  ];

  const LOGO = 'https://cdn.prod.website-files.com/689a126646e7dc6b882a5aa5/689a18c0413b7b2a935cd86e_image_2025-08-12_002224256.png';

  const OFFICE = {
    address: '110 Robinson Rd · Singapore 068901',
    site:    'd-aureliusgroup.com',
  };

  const TAGLINE = 'Real Conversations. <em>Real Results.</em>';

  /* ── render ── */
  const deck = document.getElementById('deck');
  deck.innerHTML = TEAM.map((p, i) => `
    <div class="pair" data-person="${i}">
      <div class="pair-group">
        <div class="pair-label">${p.name.replace(/<[^>]+>/g,'')} · Front</div>
        <div class="card-slot">
          <div class="card front">
            <div class="diamond">
              <div class="diamond-line"></div>
              <div class="diamond-shape"></div>
            </div>
            <div class="front-head">
              <div class="logo-mark"><img src="${LOGO}" alt=""></div>
              <div class="wordmark">D Aurelius Group</div>
            </div>
            <div class="front-body">
              <div class="name">${p.name}</div>
              <div class="hairline"></div>
              <div class="title">${p.title}</div>
            </div>
            <div class="front-foot">
              <div class="key">M</div><div class="val">${p.mobile}</div>
              <div class="key">E</div><div class="val">${p.email}</div>
            </div>
          </div>
        </div>
        <div class="card-caption">Front</div>
      </div>

      <div class="pair-group">
        <div class="pair-label">${p.name.replace(/<[^>]+>/g,'')} · Back</div>
        <div class="card-slot">
          <div class="card back">
            <div class="back-logo"><img src="${LOGO}" alt=""></div>
            <div class="back-wordmark">D Aurelius Group</div>
            <div class="back-tagline">${TAGLINE}</div>
            <div class="back-diamond">
              <div class="line"></div>
              <div class="shape"></div>
              <div class="line"></div>
            </div>
            <div class="back-foot">
              ${OFFICE.address}
              <span class="site">${OFFICE.site}</span>
            </div>
          </div>
        </div>
        <div class="card-caption">Back</div>
      </div>
    </div>
  `).join('');

  /* ── print-layout toggle ── */
  const btn = document.getElementById('togglePrint');
  btn.addEventListener('click', () => {
    document.body.classList.toggle('print-mode');
    btn.classList.toggle('active');
    btn.textContent = document.body.classList.contains('print-mode')
      ? 'Back to Preview'
      : 'Preview Print Layout';
  });
</script>
</body>
</html>
